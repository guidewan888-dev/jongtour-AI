name: World Connection Auto Sync
on:
  schedule:
    # ทุก 6 ชั่วโมง: 00:15, 06:15, 12:15, 18:15 ไทย = 17:15, 23:15, 05:15, 11:15 UTC
    - cron: '15 17,23,5,11 * * *'
  workflow_dispatch:  # สามารถกดรัน manual ได้

jobs:
  scrape-wc:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: tour-scraper/package-lock.json

      - name: Install dependencies
        working-directory: tour-scraper
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: tour-scraper
        run: npx playwright install --with-deps chromium

      - name: Run World Connection scraper only
        working-directory: tour-scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx src/main.ts --site worldconnection
